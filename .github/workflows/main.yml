name: release-helm-charts
on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - charts/terraform-mcp
          - charts/vault-mcp
          - charts/hashicorp-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Build parent chart dependencies
        if: matrix.chart == 'charts/hashicorp-mcp'
        run: helm dependency build charts/hashicorp-mcp
      - name: Lint chart
        run: helm lint "${{ matrix.chart }}"
      - name: Render chart templates
        run: helm template ci "${{ matrix.chart }}" > /dev/null

  release:
    needs: validate
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure Git user
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Build parent chart dependencies
        run: helm dependency build charts/hashicorp-mcp
      - name: Run chart-releaser job
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true # Skip charts that have already been released
