apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terraform-mcp.fullname" . }}
  labels:
    {{- include "terraform-mcp.labels" . | nindent 4 }}
spec:
  {{- include "terraform-mcp.validateValues" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "terraform-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "terraform-mcp.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: terraform-mcp-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: TFE_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.tfeSecret.name }}
              key: TFE_TOKEN
              optional: true
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if .Values.tls.mount }}
        - name: MCP_TLS_CERT_FILE
          value: "/etc/terraform-mcp/tls/tls.crt"
        - name: MCP_TLS_KEY_FILE
          value: "/etc/terraform-mcp/tls/tls.key"
        {{- end }}
        {{- if .Values.tls.mount }}
        volumeMounts:
        - name: tls-secret
          mountPath: /etc/terraform-mcp/tls
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.path }}
            port: {{ .Values.livenessProbe.port }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.readinessProbe.path }}
            port: {{ .Values.readinessProbe.port }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- if .Values.tls.mount }}
      volumes:
      - name: tls-secret
        secret:
          secretName: {{ .Values.tls.secretName | quote }}
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      {{- end }}
