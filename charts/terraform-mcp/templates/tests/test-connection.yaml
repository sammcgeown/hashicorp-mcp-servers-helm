apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "terraform-mcp.fullname" . }}-test-connection"
  labels:
    {{- include "terraform-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
  - name: wget
    image: busybox
    command: ['wget']
    args:
    - '--spider'
    - '--timeout=5'
    - 'http://{{ include "terraform-mcp.fullname" . }}-svc:{{ .Values.service.port }}{{ .Values.env.MCP_ENDPOINT }}'
