{{- if .Values.httproute.enabled }}
{{- if .Values.httproute.gateway.create }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.httproute.gateway.name | default (printf "%s-gateway" (include "hashicorp-mcp.fullname" .)) }}
  labels:
    {{- include "hashicorp-mcp.labels" . | nindent 4 }}
  {{- with .Values.httproute.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.httproute.gateway.gatewayClassName }}
  listeners:
    {{- toYaml .Values.httproute.gateway.listeners | nindent 4 }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "hashicorp-mcp.fullname" . }}-httproute
  labels:
    {{- include "hashicorp-mcp.labels" . | nindent 4 }}
  {{- with .Values.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.httproute.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
  {{- with .Values.httproute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if index .Values "terraform-mcp" "enabled" }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ index .Values "terraform-mcp" "path" }}
      backendRefs:
        - name: {{ .Release.Name }}-terraform-mcp-svc
          port: {{ index .Values "terraform-mcp" "service" "port" | default 80 }}
    {{- end }}
    {{- if index .Values "vault-mcp" "enabled" }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ index .Values "vault-mcp" "path" }}
      backendRefs:
        - name: {{ .Release.Name }}-vault-mcp-svc
          port: {{ index .Values "vault-mcp" "service" "port" | default 80 }}
    {{- end }}
{{- end }}
